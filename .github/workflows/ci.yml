name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm test

      # E2E tests are currently disabled because edge runtime (required for Cloudflare)
      # is incompatible with better-sqlite3 (used for local dev database)
      # TODO: Re-enable once we have a test database solution compatible with edge runtime
      # - name: Install Playwright browsers
      #   run: npx playwright install --with-deps
      #
      # - name: Run e2e tests
      #   run: pnpm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
